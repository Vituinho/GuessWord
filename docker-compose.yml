services:
  postgres:
    image: postgres:16-alpine
    container_name: guessword-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guessword
      POSTGRES_USER: guessword
      POSTGRES_PASSWORD: guessword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guessword -d guessword"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
